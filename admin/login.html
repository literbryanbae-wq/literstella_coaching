<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 | 리터스텔라</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(150deg,#0D2447,#1A3C6B 60%,#1A5A4A);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.logo{font-size:22px;font-weight:900;color:#1A3C6B;text-align:center;margin-bottom:6px;}
.sub{font-size:13px;color:#8E9BAB;text-align:center;margin-bottom:36px;}
label{display:block;font-size:11px;font-weight:700;color:#6B7A8D;letter-spacing:.1em;margin-bottom:7px;}
input{width:100%;border:1.5px solid #E6EDF5;border-radius:10px;padding:13px 16px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;margin-bottom:16px;}
input:focus{border-color:#2E75B6;box-shadow:0 0 0 3px rgba(46,117,182,.08);}
.btn{width:100%;background:linear-gradient(135deg,#1A3C6B,#2E75B6);color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px;transition:opacity .2s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.error{background:#FDECEA;color:#C0392B;font-size:13px;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Liter Stella</div>
  <div class="sub">관리자 전용 로그인</div>
  <div>
    <label>이메일</label>
    <input type="email" id="email" placeholder="관리자 이메일" onkeydown="if(event.key==='Enter')login()">
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" id="login-btn" onclick="login()">로그인</button>
    <div class="error" id="err"></div>
  </div>
</div>

<script>
const ADMIN_EMAILS=['literbryanbae@gmail.com','jayne0609@gmail.com'];
firebase.initializeApp({
  apiKey:"AIzaSyCTh5ZK03MpKy4pc2w3GTuV-Q-zHoYY0oI",
  authDomain:"literstella.firebaseapp.com",
  projectId:"literstella",
  storageBucket:"literstella.firebasestorage.app",
  messagingSenderId:"510303446020",
  appId:"1:510303446020:web:5e0188919058b9fc5f4151"
});
const auth=firebase.auth();

auth.onAuthStateChanged(u=>{
  if(u&&ADMIN_EMAILS.includes(u.email)) window.location.href='dashboard.html';
});

function login(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('login-btn');
  err.style.display='none';
  if(!ADMIN_EMAILS.includes(email)){err.textContent='등록된 관리자 이메일이 아닙니다.';err.style.display='block';return;}
  btn.disabled=true; btn.textContent='로그인 중...';
  auth.signInWithEmailAndPassword(email,pw)
    .then(()=>window.location.href='dashboard.html')
    .catch(()=>{err.textContent='이메일 또는 비밀번호가 올바르지 않습니다.';err.style.display='block';btn.disabled=false;btn.textContent='로그인';});
}
</script>
</body>
</html>
