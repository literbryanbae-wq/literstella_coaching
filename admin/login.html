<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 | 리터스텔라</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(150deg,#0D2447,#1A3C6B 60%,#1A5A4A);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:20px;padding:44px 40px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.28);}
.logo-wrap{text-align:center;margin-bottom:20px;}
.logo{font-size:22px;font-weight:900;color:#1A3C6B;margin-bottom:4px;}
.logo-sub{font-size:11px;color:#8E9BAB;letter-spacing:.08em;}
.divider{border:none;border-top:1px solid #EEF2F7;margin:20px 0;}
.quick-label{font-size:10px;font-weight:700;color:#8E9BAB;letter-spacing:.12em;text-align:center;margin-bottom:12px;}
.quick-menu{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.quick-item{display:flex;flex-direction:column;align-items:center;gap:5px;background:#F5F8FC;border:1.5px solid #E6EDF5;border-radius:12px;padding:12px 6px;text-decoration:none;transition:all .2s;}
.quick-item:hover{border-color:#2E75B6;background:#EBF3FB;transform:translateY(-2px);}
.qi-ico{font-size:20px;}
.qi-txt{font-size:11px;font-weight:700;color:#1A3C6B;text-align:center;line-height:1.4;}
.qi-note{font-size:9px;color:#A0AABB;text-align:center;}
.form-section label{display:block;font-size:11px;font-weight:700;color:#6B7A8D;letter-spacing:.1em;margin-bottom:7px;}
.form-section input{width:100%;border:1.5px solid #E6EDF5;border-radius:10px;padding:13px 16px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;margin-bottom:14px;}
.form-section input:focus{border-color:#2E75B6;box-shadow:0 0 0 3px rgba(46,117,182,.08);}

/* 아이디 기억하기 체크박스 스타일 */
.remember-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  margin-top: -4px;
}
.remember-wrap input[type="checkbox"] {
  width: 14px;
  height: 14px;
  margin: 0;
  cursor: pointer;
  accent-color: #2E75B6;
}
.remember-wrap label {
  font-size: 12px;
  color: #6B7A8D;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 0;
  letter-spacing: 0;
  display: inline-block;
  text-transform: none;
}

.btn{width:100%;background:linear-gradient(135deg,#1A3C6B,#2E75B6);color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:4px;transition:opacity .2s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.pw-find{text-align:center;margin-top:14px;}
.pw-find button{background:none;border:none;font-size:12px;color:#A0AABB;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-decoration:underline;transition:color .2s;}
.pw-find button:hover{color:#2E75B6;}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;line-height:1.6;}
.msg.error{background:#FDECEA;color:#C0392B;}
.msg.success{background:#EAF4EE;color:#2A7A4A;}
.bottom-note{margin-top:20px;text-align:center;font-size:11px;color:rgba(255,255,255,.35);line-height:1.8;}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo">Liter Stella</div>
    <div class="logo-sub">관리자 전용 · Admin Only</div>
  </div>

  <hr class="divider">

  <div class="quick-label">바로가기</div>
  <div class="quick-menu" style="grid-template-columns:repeat(4,1fr);">
    <a class="quick-item" href="dashboard.html">
      <span class="qi-ico">📋</span>
      <span class="qi-txt">지원서</span>
      <span class="qi-note">로그인 필요</span>
    </a>
    <a class="quick-item" href="curriculum.html">
      <span class="qi-ico">📘</span>
      <span class="qi-txt">커리큘럼</span>
      <span class="qi-note">로그인 필요</span>
    </a>
    <a class="quick-item" href="group-feedback.html">
      <span class="qi-ico">👥</span>
      <span class="qi-txt">그룹 피드백</span>
      <span class="qi-note">로그인 필요</span>
    </a>
    <a class="quick-item" href="evaluation.html">
      <span class="qi-ico">🌟</span>
      <span class="qi-txt">평가표</span>
      <span class="qi-note">로그인 필요</span>
    </a>
  </div>

  <hr class="divider">

  <div class="form-section">
    <label>이메일</label>
    <input type="email" id="email" placeholder="관리자 이메일" onkeydown="if(event.key==='Enter')login()">
    
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
    
    <div class="remember-wrap">
      <input type="checkbox" id="remember-id">
      <label for="remember-id">아이디 기억하기</label>
    </div>

    <button class="btn" id="login-btn" onclick="login()">로그인</button>
    <div class="msg error" id="err"></div>
    <div class="msg success" id="suc"></div>
  </div>

  <div class="pw-find">
    <button onclick="resetPassword()">비밀번호를 잊으셨나요?</button>
  </div>
</div>

<p class="bottom-note">
  <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="9df1f4e9f8efffefe4fcf3fffcf8ddfaf0fcf4f1b3fef2f0">[email&#160;protected]</a> · <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="d7bdb6aeb9b2e7e1e7ee97b0bab6bebbf9b4b8ba">[email&#160;protected]</a><br>
  등록된 관리자 계정으로만 접근 가능합니다
</p>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
<script>
const ADMIN_EMAILS = ['literbryanbae@gmail.com','jayne0609@gmail.com'];

firebase.initializeApp({
  apiKey:"AIzaSyCTh5ZK03MpKy4pc2w3GTuV-Q-zHoYY0oI",
  authDomain:"literstella.firebaseapp.com",
  projectId:"literstella",
  storageBucket:"literstella.firebasestorage.app",
  messagingSenderId:"510303446020",
  appId:"1:510303446020:web:5e0188919058b9fc5f4151"
});
const auth = firebase.auth();

// 페이지 로드 시 저장된 아이디가 있으면 불러오기
document.addEventListener('DOMContentLoaded', () => {
  const savedEmail = localStorage.getItem('savedAdminEmail');
  if (savedEmail) {
    document.getElementById('email').value = savedEmail;
    document.getElementById('remember-id').checked = true;
  }
});

auth.onAuthStateChanged(u => {
  if(u && ADMIN_EMAILS.includes(u.email)) window.location.href = 'dashboard.html';
});

function login(){
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('pw').value;
  const err   = document.getElementById('err');
  const suc   = document.getElementById('suc');
  const btn   = document.getElementById('login-btn');
  
  err.style.display = 'none';
  suc.style.display = 'none';
  
  if(!ADMIN_EMAILS.includes(email)){
    err.textContent = '등록된 관리자 이메일이 아닙니다.';
    err.style.display = 'block';
    return;
  }

  // 아이디 기억하기 처리 로직
  const rememberId = document.getElementById('remember-id').checked;
  if (rememberId) {
    localStorage.setItem('savedAdminEmail', email);
  } else {
    localStorage.removeItem('savedAdminEmail');
  }

  btn.disabled = true;
  btn.textContent = '로그인 중...';
  
  auth.signInWithEmailAndPassword(email, pw)
    .then(() => window.location.href = 'dashboard.html')
    .catch(() => {
      err.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '로그인';
    });
}

function resetPassword(){
  const email = document.getElementById('email').value.trim();
  const err   = document.getElementById('err');
  const suc   = document.getElementById('suc');
  
  err.style.display = 'none';
  suc.style.display = 'none';
  
  if(!email){
    err.textContent = '이메일을 먼저 입력해 주세요.';
    err.style.display = 'block';
    return;
  }
  
  if(!ADMIN_EMAILS.includes(email)){
    err.textContent = '등록된 관리자 이메일이 아닙니다.';
    err.style.display = 'block';
    return;
  }
  
  auth.sendPasswordResetEmail(email)
    .then(() => {
      suc.textContent = '비밀번호 재설정 메일이 전송되었습니다. 메일함을 확인해주세요.';
      suc.style.display = 'block';
    })
    .catch((error) => {
      err.textContent = '메일 발송 중 오류가 발생했습니다. (' + error.message + ')';
      err.style.display = 'block';
    });
}
</script>
</body>
</html>
