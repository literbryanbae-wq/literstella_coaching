<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--navy:#1A3C6B;--blue:#2E75B6;--teal:#2A8A8A;--gold:#C8922A;--green:#2A7A4A;--red:#C0392B;--gray:#6B7A8D;--lg:#E6EDF5;--cream:#FAF7F2;}
body{font-family:'Noto Sans KR',sans-serif;background:#F0F4F8;color:#1C2A3A;}
.nav{background:var(--navy);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.nav-logo{color:#fff;font-size:15px;font-weight:700;}
.nav-links{display:flex;gap:4px;}
.nav-link{color:rgba(255,255,255,.65);font-size:13px;font-weight:600;padding:6px 14px;border-radius:6px;text-decoration:none;transition:all .2s;}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.15);color:#fff;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-user{color:rgba(255,255,255,.5);font-size:12px;}
.nav-btn{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.65);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.wrap{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;}
/* FORM CARD */
.form-card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden;}
.card-header{background:var(--navy);padding:18px 22px;display:flex;justify-content:space-between;align-items:center;}
.card-title{color:#fff;font-size:16px;font-weight:700;}
.card-sub{color:rgba(255,255,255,.55);font-size:12px;margin-top:2px;}
.header-btns{display:flex;gap:8px;}
.hbtn{border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.8);font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.hbtn:hover{background:rgba(255,255,255,.15);color:#fff;}
.hbtn.primary{background:linear-gradient(135deg,var(--gold),#E8B040);border-color:transparent;color:#fff;}
.card-body{padding:22px;}
/* FIELDS */
.f{margin-bottom:16px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--gray);letter-spacing:.12em;margin-bottom:6px;}
.fi{width:100%;border:1.5px solid var(--lg);border-radius:8px;padding:10px 13px;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;color:#1C2A3A;outline:none;transition:border-color .2s;background:var(--cream);}
.fi:focus{border-color:var(--blue);background:#fff;}
.ft{width:100%;border:1.5px solid var(--lg);border-radius:8px;padding:10px 13px;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;color:#1C2A3A;outline:none;resize:vertical;line-height:1.75;transition:border-color .2s;background:var(--cream);}
.ft:focus{border-color:var(--blue);background:#fff;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.chi{display:none;}
.chl{border:1.5px solid var(--lg);border-radius:16px;padding:5px 12px;font-size:12px;color:var(--gray);cursor:pointer;transition:all .15s;user-select:none;}
.chi:checked+.chl{border-color:var(--navy);background:var(--navy);color:#fff;}
.chi.t:checked+.chl{border-color:var(--teal);background:var(--teal);color:#fff;}
.chi.g:checked+.chl{border-color:var(--green);background:var(--green);color:#fff;}
/* SECTION DIVIDER */
.sdiv{border:none;border-top:1px solid var(--lg);margin:18px 0;}
.slabel{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.08em;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--navy);display:inline-block;}
/* WEEK TABLE */
.wt{width:100%;border-collapse:collapse;font-size:12.5px;}
.wt thead th{background:#F5F8FC;padding:8px 10px;font-size:10px;font-weight:700;color:var(--navy);text-align:left;letter-spacing:.07em;border-bottom:1px solid var(--lg);}
.wt tbody td{padding:8px 10px;border-bottom:1px solid var(--lg);vertical-align:middle;}
.wt tbody tr:last-child td{border-bottom:none;}
.wt input{width:100%;border:1.5px solid var(--lg);border-radius:6px;padding:6px 8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff;}
.wt input:focus{border-color:var(--blue);}
.wt select{border:1.5px solid var(--lg);border-radius:6px;padding:5px 7px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer;background:#fff;width:70px;}
/* LIST CARD */
.list-card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden;position:sticky;top:74px;}
.list-item{padding:14px 18px;border-bottom:1px solid var(--lg);cursor:pointer;transition:background .15s;}
.list-item:last-child{border-bottom:none;}
.list-item:hover{background:#F5F8FE;}
.list-item.active{background:#EBF3FB;}
.li-name{font-size:14px;font-weight:700;color:var(--navy);}
.li-meta{font-size:11px;color:var(--gray);margin-top:3px;}
.list-empty{padding:32px 18px;text-align:center;color:var(--gray);font-size:13px;}
/* SAVE AREA */
.save-bar{padding:16px 22px;background:#F8FAFE;border-top:1px solid var(--lg);display:flex;justify-content:space-between;align-items:center;}
.save-note{font-size:12px;color:var(--gray);}
.save-btn{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border:none;padding:11px 28px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .2s;}
.save-btn:hover{opacity:.9;}
.save-btn:disabled{opacity:.6;cursor:not-allowed;}
/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:14px;padding:12px 24px;border-radius:30px;display:none;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.2);}
/* 인쇄 오버레이 */
.print-ov{display:none;position:fixed;inset:0;background:rgba(10,20,40,.88);z-index:300;overflow-y:auto;padding:24px 16px;}
.print-ov-bar{max-width:780px;margin:0 auto 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.print-ov-bar span{color:rgba(255,255,255,.65);font-size:13px;}
.print-ov-btns{display:flex;gap:8px;}
.pob{border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.pob.do{background:linear-gradient(135deg,#C8922A,#E8B040);color:#fff;}
.pob.cl{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);}
.print-ov-doc{max-width:780px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);}
@media print{
  body>*:not(.print-ov){display:none!important;}
  .print-ov{display:block!important;position:static!important;background:none!important;padding:0!important;}
  .print-ov-bar{display:none!important;}
  .print-ov-doc{box-shadow:none!important;border-radius:0!important;max-width:100%!important;}
  @page{margin:8mm;size:A4;}
}
@media(max-width:900px){.wrap{grid-template-columns:1fr;}.list-card{position:static;}}
</style>
</head>

<script>
const ADMINS=['literbryanbae@gmail.com','jayne0609@gmail.com'];
firebase.initializeApp({apiKey:"AIzaSyCTh5ZK03MpKy4pc2w3GTuV-Q-zHoYY0oI",authDomain:"literstella.firebaseapp.com",projectId:"literstella",storageBucket:"literstella.firebasestorage.app",messagingSenderId:"510303446020",appId:"1:510303446020:web:5e0188919058b9fc5f4151"});
const auth=firebase.auth(), db=firebase.firestore();
let docs=[], apps=[], curDocId=null;

auth.onAuthStateChanged(u=>{
  if(!u||!ADMINS.includes(u.email)){window.location.href='login.html';return;}
  document.getElementById('umail').textContent=u.email;
  loadApplicants(); loadDocs();
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-c1date').value=new Date().toISOString().split('T')[0];
});
function logout(){auth.signOut().then(()=>window.location.href='login.html');}

function loadApplicants(){
  db.collection('applications').orderBy('submittedAt','desc').onSnapshot(snap=>{
    apps=snap.docs.map(d=>({id:d.id,...d.data()}));
    const sel=document.getElementById('f-applicant');
    const cur=sel.value;
    sel.innerHTML='<option value="">-- 수강생 선택 --</option>'+apps.map(a=>`<option value="${a.id}">${a.name||'이름없음'} (${a.email||''})</option>`).join('');
    if(cur)sel.value=cur;
  });
}
function loadDocs(){
  db.collection('curriculums').orderBy('updatedAt','desc').onSnapshot(snap=>{
    docs=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList();
  });
}
function renderList(){
  document.getElementById('list-cnt').textContent=docs.length+'건';
  const el=document.getElementById('list-body');
  if(!docs.length){el.innerHTML='<div class="list-empty">아직 작성된 설계서가 없습니다</div>';return;}
  el.innerHTML=docs.map(d=>`<div class="list-item${d.id===curDocId?' active':''}" onclick="loadDoc('${d.id}')">
    <div class="li-name">${d.applicantName||'—'}</div>
    <div class="li-meta">${d.book||'원서 미정'} · C1: ${d.c1Total||'—'}점 · ${fmtDate(d.updatedAt)}</div>
  </div>`).join('');
}
function onApplicantChange(){
  const id=document.getElementById('f-applicant').value;
  const a=apps.find(x=>x.id===id);
  if(a&&a.slogan) document.getElementById('f-slogan').value=a.slogan;
}
function loadDoc(id){
  const d=docs.find(x=>x.id===id); if(!d)return;
  curDocId=id;
  document.getElementById('f-applicant').value=d.applicantId||'';
  document.getElementById('f-book').value=d.book||'';
  document.getElementById('f-date').value=d.designDate||'';
  document.getElementById('f-c1date').value=d.c1Date||'';
  document.getElementById('f-c1comment').value=d.c1Comment||'';
  document.getElementById('f-direction').value=d.direction||'';
  document.getElementById('f-slogan').value=d.slogan||'';
  document.getElementById('f-cheering').value=d.cheering||'';
  document.getElementById('f-target').value=d.target||'';
  document.getElementById('f-channel').value=d.channel||'';
  document.getElementById('f-memo').value=d.memo||'';
  // weeks
  for(let i=1;i<=5;i++){
    const w=d['week'+i]||{};
    document.getElementById('w'+i+'-content').value=w.content||'';
    document.getElementById('w'+i+'-comment').value=w.comment||'';
    document.getElementById('w'+i+'-score').value=w.score||'';
  }
  // chips
  document.querySelectorAll('input[id^="s"]').forEach(el=>el.checked=(d.strengths||[]).includes(el.value));
  document.querySelectorAll('input[id^="r"]').forEach(el=>el.checked=(d.improvements||[]).includes(el.value));
  document.querySelectorAll('input[name="ty"]').forEach(el=>el.checked=el.value===d.lectureType);
  document.querySelectorAll('input[name="pp"]').forEach(el=>el.checked=el.value===d.partnerPotential);
  calcC1();
  document.getElementById('cur-sub').textContent=(d.applicantName||'')+'  설계서';
  renderList();
  document.getElementById('save-note').textContent='마지막 저장: '+fmtDate(d.updatedAt);
}
function calcC1(){
  let total=0;
  for(let i=1;i<=5;i++){const v=parseInt(document.getElementById('w'+i+'-score').value)||0;total+=v;}
  document.getElementById('c1-total').textContent=total;
  const g=total>=18?'S (탁월)':total>=16?'A (우수)':total>=12?'B (양호)':total>=8?'C (보통)':'D (보완필요)';
  const gc=total>=16?'var(--green)':total>=12?'var(--blue)':total>=8?'var(--gold)':'var(--red)';
  document.getElementById('c1-grade').textContent=g;
  document.getElementById('c1-grade').style.color=gc;
}
async function saveDoc(){
  const appId=document.getElementById('f-applicant').value;
  if(!appId){alert('수강생을 선택해주세요.');return;}
  const a=apps.find(x=>x.id===appId);
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  const weeks={};
  for(let i=1;i<=5;i++){weeks['week'+i]={content:document.getElementById('w'+i+'-content').value,comment:document.getElementById('w'+i+'-comment').value,score:document.getElementById('w'+i+'-score').value};}
  const data={
    applicantId:appId, applicantName:a?.name||'',
    book:document.getElementById('f-book').value,
    designDate:document.getElementById('f-date').value,
    c1Date:document.getElementById('f-c1date').value,
    c1Total:parseInt(document.getElementById('c1-total').textContent)||0,
    c1Comment:document.getElementById('f-c1comment').value,
    strengths:[...document.querySelectorAll('input[id^="s"]:checked')].map(e=>e.value),
    improvements:[...document.querySelectorAll('input[id^="r"]:checked')].map(e=>e.value),
    lectureType:document.querySelector('input[name="ty"]:checked')?.value||'',
    partnerPotential:document.querySelector('input[name="pp"]:checked')?.value||'',
    direction:document.getElementById('f-direction').value,
    target:document.getElementById('f-target').value,
    channel:document.getElementById('f-channel').value,
    slogan:document.getElementById('f-slogan').value,
    cheering:document.getElementById('f-cheering').value,
    memo:document.getElementById('f-memo').value,
    ...weeks,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  try{
    if(curDocId){await db.collection('curriculums').doc(curDocId).update(data);}
    else{const ref=await db.collection('curriculums').add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});curDocId=ref.id;}
    showToast('✅ 저장 완료');
    document.getElementById('save-note').textContent='방금 저장됨';
  }catch(e){alert('저장 실패: '+e.message);}
  btn.disabled=false; btn.textContent='💾 저장하기';
}
function newDoc(){
  curDocId=null;
  document.querySelectorAll('.fi,.ft').forEach(el=>{if(!el.readOnly&&el.type!=='date')el.value='';});
  document.querySelectorAll('input[type=checkbox],input[type=radio]').forEach(el=>el.checked=false);
  for(let i=1;i<=5;i++){['content','comment','score'].forEach(k=>document.getElementById('w'+i+'-'+k).value='');}
  document.getElementById('c1-total').textContent='0';
  document.getElementById('c1-grade').textContent='';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('cur-sub').textContent='신규 작성';
  document.getElementById('save-note').textContent='저장되지 않은 문서';
  renderList();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500);}
function fmtDate(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return`${d.getFullYear()}.${p2(d.getMonth()+1)}.${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
